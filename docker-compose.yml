version: '3.8'
services:
  app:
    build: .
    container_name: oauth_app
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - postgres
    networks:
      - oauth_network

  postgres:
    image: postgres:15
    container_name: oauth_postgres
    environment:
      POSTGRES_USER: oauth_user
      POSTGRES_PASSWORD: oauth_password
      POSTGRES_DB: oauth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oauth_network

volumes:
  postgres_data:

networks:
  oauth_network: